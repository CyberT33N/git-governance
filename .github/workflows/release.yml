name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing immutable v<semver> tag to release"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'CyberT33N/git-governance'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out immutable release source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        shell: bash
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if ! [[ "${tag}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag ${tag} is not a valid v<semver> release tag."
            exit 1
          fi
          tag_commit="$(git rev-parse "refs/tags/${tag}^{commit}")"
          test "${tag_commit}" = "$(git rev-parse HEAD)"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: go.sum

      - name: Verify release source
        shell: bash
        run: |
          set -euo pipefail
          go mod download
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          files="$(gofmt -l $(git ls-files '*.go'))"
          test -z "$files" || {
            echo "The following files require gofmt:"
            echo "$files"
            exit 1
          }
          go test ./...
          go run ./cmd/check-coverage
          CGO_ENABLED=1 go test -race ./...
          go vet ./...
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          "$(go env GOPATH)/bin/govulncheck" ./...
          go test ./internal/domain/ticket -run=^$ -fuzz=FuzzParseTicketValues -fuzztime=2s -parallel=1
          go test ./internal/domain/branch -run=^$ -fuzz=FuzzParseBranchValues -fuzztime=2s -parallel=1
          go test ./internal/domain/commitmsg -run=^$ -fuzz=FuzzParseCommitMessage -fuzztime=2s -parallel=1
          go test ./internal/adapters/configfs -run=^$ -fuzz=FuzzDecodePreferences -fuzztime=2s -parallel=1
          go test ./internal/adapters/quality -run=^$ -fuzz=FuzzDecodeQualityConfiguration -fuzztime=2s -parallel=1
          go install github.com/evilmartians/lefthook/v2@v2.1.10
          "$(go env GOPATH)/bin/lefthook" validate

      - name: Install Syft for GoReleaser SBOM generation
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0

      - name: Install Cosign for checksum signing
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.6

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: check

      - name: Build, package, sign, and publish
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify published release artifact set
        shell: bash
        run: |
          set -euo pipefail
          checksum="$(find dist -type f -name '*checksums.txt' -print -quit)"
          test -n "${checksum}"
          test -n "$(find dist -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print -quit)"
          test -n "$(find dist -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.apk' \) -print -quit)"
          test -n "$(find dist -type f -name '*.sigstore.json' -print -quit)"
          test -n "$(find dist -type f \( -name '*.sbom.json' -o -name '*.spdx.json' \) -print -quit)"
          (
            cd "$(dirname "${checksum}")"
            sha256sum --check "$(basename "${checksum}")"
          )

      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: "dist/**"
