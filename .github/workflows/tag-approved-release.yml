name: Tag Approved Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: release-tag-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  tag:
    name: Tag merged release branch
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      github.event.pull_request.merge_commit_sha != ''
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Check out main with complete history
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: main

      - name: Validate promotion and derive immutable tag
        id: release
        shell: bash
        env:
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          version="${RELEASE_BRANCH#release/}"
          if [[ "${RELEASE_BRANCH}" == "${version}" ]] || ! [[ "${version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Merged source branch is not a canonical release/<semver> branch: ${RELEASE_BRANCH}" >&2
            exit 1
          fi
          if ! git cat-file -e "${MERGE_SHA}^{commit}"; then
            echo "The pull-request merge SHA is not an available commit: ${MERGE_SHA}" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${MERGE_SHA}" "origin/main"; then
            echo "The release merge commit is not contained in origin/main." >&2
            exit 1
          fi

          tag="v${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag ${tag} already exists; refusing to replace an immutable release." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create annotated tag at the release merge commit
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "${TAG}" "${MERGE_SHA}" --message "Release ${VERSION}"
          git push origin "refs/tags/${TAG}"

      - name: Dispatch the artifact workflow for the immutable tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          payload="$(printf '{"ref":"%s","inputs":{"tag":"%s"}}' "${TAG}" "${TAG}")"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --url "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/dispatches" \
            --data "${payload}"
