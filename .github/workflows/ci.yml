name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Run full build gate
        run: go run ./cmd/build

  native-smoke:
    name: Native smoke test (${{ matrix.name }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            extension: ""
          - name: linux-arm64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            extension: ""
          - name: macos-amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            extension: ""
          - name: macos-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            extension: ""
          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            extension: ".exe"
          - name: windows-arm64
            os: windows-11-arm
            goos: windows
            goarch: arm64
            extension: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Build and smoke test native binary
        shell: bash
        run: |
          set -euo pipefail
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"
          mkdir -p dist
          go build -trimpath -o "dist/git-governance${{ matrix.extension }}" ./cmd/git-governance
          "./dist/git-governance${{ matrix.extension }}" --version
          "./dist/git-governance${{ matrix.extension }}" --output json branch list
          "./dist/git-governance${{ matrix.extension }}" --output json policy describe
          "./dist/git-governance${{ matrix.extension }}" --output json doctor

  release-config:
    name: Release configuration
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: v2.16.0
          args: check
