name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOFLAGS: -mod=readonly
  GOVCS: "*:off"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
          - name: macos-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
          - name: windows-amd64
            os: windows-2025
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Verify controlled Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          test "$(go env GOVERSION)" = "go1.26.5"
          test "$(go env GOTOOLCHAIN)" = "local"
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"

      - name: Run full build gate
        run: go run -mod=readonly ./cmd/build

      - name: Report coverage breakdown on failure
        if: failure()
        shell: bash
        run: |
          go test -count=1 -coverprofile=coverage.out ./... || true
          test ! -f coverage.out || go tool cover -func=coverage.out

  native-smoke:
    name: Native smoke test (${{ matrix.name }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            extension: ""
          - name: linux-arm64
            os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            extension: ""
          - name: macos-amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            extension: ""
          - name: macos-arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            extension: ""
          - name: windows-amd64
            os: windows-2025
            goos: windows
            goarch: amd64
            extension: ".exe"
          - name: windows-arm64
            os: windows-11-arm
            goos: windows
            goarch: arm64
            extension: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Verify controlled Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          test "$(go env GOVERSION)" = "go1.26.5"
          test "$(go env GOTOOLCHAIN)" = "local"

      - name: Build and smoke test native binary
        shell: bash
        run: |
          set -euo pipefail
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"
          mkdir -p .build/bin
          go build -mod=readonly -trimpath -o ".build/bin/git-governance${{ matrix.extension }}" ./cmd/git-governance
          "./.build/bin/git-governance${{ matrix.extension }}" --version
          "./.build/bin/git-governance${{ matrix.extension }}" --output json branch list
          "./.build/bin/git-governance${{ matrix.extension }}" --output json policy describe

  release-config:
    name: Release configuration
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.16.0
          args: check
