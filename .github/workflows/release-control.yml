name: Governed Release Control

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Verify the broker or request a protected release cut.
        required: true
        type: choice
        options:
          - broker-smoke
          - release-cut
      version:
        description: SemVer release version without a leading v; required for release-cut.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-control-${{ inputs.operation }}-${{ inputs.version || github.ref }}
  cancel-in-progress: false

jobs:
  broker-smoke:
    if: ${{ inputs.operation == 'broker-smoke' }}
    name: Verify release credential broker
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: release
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Require broker configuration
        shell: bash
        env:
          BROKER_URL: ${{ vars.GCP_BROKER_URL }}
          WIF_PROVIDER: ${{ vars.GCP_BROKER_WIF_PROVIDER }}
          INVOKER_SERVICE_ACCOUNT: ${{ vars.GCP_BROKER_INVOKER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          for variable in BROKER_URL WIF_PROVIDER INVOKER_SERVICE_ACCOUNT; do
            test -n "${!variable:-}" || { echo "missing GitHub variable: $variable" >&2; exit 1; }
          done

      - name: Obtain short-lived broker audience token
        id: broker_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: false
          workload_identity_provider: ${{ vars.GCP_BROKER_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_BROKER_INVOKER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ vars.GCP_BROKER_URL }}

      - name: Verify approved and rejected broker requests without token output
        shell: bash
        env:
          BROKER_URL: ${{ vars.GCP_BROKER_URL }}
          BROKER_ID_TOKEN: ${{ steps.broker_auth.outputs.id_token }}
        run: |
          set -euo pipefail
          response="$(mktemp)"
          trap 'rm -f "$response"' EXIT

          approved_status="$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
            --request POST "$BROKER_URL/v1/github/installations/token" \
            --header "Authorization: Bearer $BROKER_ID_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"host":"github.com","owner":"CyberT33N","repository":"git-governance"}')"
          test "$approved_status" = "200"

          rejected_status="$(curl --silent --show-error --output "$response" --write-out '%{http_code}' \
            --request POST "$BROKER_URL/v1/github/installations/token" \
            --header "Authorization: Bearer $BROKER_ID_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"host":"github.com","owner":"CyberT33N","repository":"not-approved"}')"
          test "$rejected_status" = "403"

  release-cut:
    if: ${{ inputs.operation == 'release-cut' }}
    name: Request protected release cut
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: release
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: true
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Require approved release-control inputs
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          BROKER_URL: ${{ vars.GCP_BROKER_URL }}
          WIF_PROVIDER: ${{ vars.GCP_BROKER_WIF_PROVIDER }}
          INVOKER_SERVICE_ACCOUNT: ${{ vars.GCP_BROKER_INVOKER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "$VERSION" || { echo "release-cut requires version" >&2; exit 1; }
          for variable in BROKER_URL WIF_PROVIDER INVOKER_SERVICE_ACCOUNT; do
            test -n "${!variable:-}" || { echo "missing GitHub variable: $variable" >&2; exit 1; }
          done

      - name: Obtain short-lived broker audience token
        id: broker_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: false
          workload_identity_provider: ${{ vars.GCP_BROKER_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_BROKER_INVOKER_SERVICE_ACCOUNT }}
          token_format: id_token
          id_token_audience: ${{ vars.GCP_BROKER_URL }}

      - name: Request governed release cut
        shell: bash
        env:
          GIT_GOVERNANCE_GITHUB_CREDENTIAL_BROKER_URL: ${{ vars.GCP_BROKER_URL }}
          GIT_GOVERNANCE_WORKLOAD_IDENTITY_TOKEN: ${{ steps.broker_auth.outputs.id_token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          go run -mod=readonly ./cmd/git-governance \
            --interactive never \
            --output json \
            --yes \
            --pull-request-provider github \
            workflow release cut \
            --version "$VERSION" \
            --dispatch
