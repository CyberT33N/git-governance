# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: git-governance

before:
  hooks:
    - go run -mod=readonly ./cmd/generate-docs --out dist/generated

builds:
  - id: git-governance
    main: ./cmd/git-governance
    binary: git-governance
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .CommitDate }}

archives:
  - id: default
    ids:
      - git-governance
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - docs/**
      - CONTRIBUTING.md
      - LICENSE
      - NOTICE
      - dist/generated/completions/*
      - dist/generated/man/*

nfpms:
  - id: linux-packages
    ids:
      - git-governance
    package_name: git-governance
    description: Native cross-platform CLI for governed Git branch, commit, and workflow operations.
    maintainer: CyberT33N
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    ids:
      - default

signs:
  - id: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

release:
  github:
    owner: CyberT33N
    name: git-governance
  prerelease: auto

changelog:
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
